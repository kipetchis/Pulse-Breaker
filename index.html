<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Breaker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Jeu casse-brique coloré et rythmé"></canvas>

      <section class="hud" aria-label="Interface du jeu">
        <div class="brand">
          <span class="beat-dot"></span>
          <h1>Pulse Breaker</h1>
          <button id="music-button" class="music-button" type="button" aria-label="Couper la musique">♪</button>
        </div>
        <div class="stats">
          <div>
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>Combo</span>
            <strong id="combo">x1</strong>
          </div>
          <div>
            <span>Vies</span>
            <strong id="lives">3</strong>
          </div>
          <div>
            <span>Record</span>
            <strong id="best">0</strong>
          </div>
          <div>
            <span>Pouvoir</span>
            <strong id="power">-</strong>
          </div>
        </div>
      </section>

      <section class="overlay" id="overlay">
        <div class="panel">
          <p class="kicker">Arcade rythmée</p>
          <h2 id="overlay-title">Prêt ?</h2>
          <p id="overlay-copy">
            Déplace la raquette avec la souris ou les flèches. Casse les briques
            dans le tempo, garde le combo vivant et attrape les bonus. Échap met en pause.
          </p>
          <div class="difficulty" id="difficulty" aria-label="Difficulté">
            <button class="difficulty-button" type="button" data-difficulty="chill">Chill</button>
            <button class="difficulty-button is-selected" type="button" data-difficulty="arcade">Arcade</button>
            <button class="difficulty-button" type="button" data-difficulty="hardcore">Hardcore</button>
          </div>
          <div class="option-row" id="theme-options" aria-label="Fond">
            <button class="option-button is-selected" type="button" data-theme="neon">Neon</button>
            <button class="option-button" type="button" data-theme="sunset">Sunset</button>
            <button class="option-button" type="button" data-theme="matrix">Matrix</button>
            <button class="option-button" type="button" data-theme="void">Void</button>
          </div>
          <div class="option-row" id="track-options" aria-label="Musique">
            <button class="option-button is-selected" type="button" data-track="pulse">Pulse</button>
            <button class="option-button" type="button" data-track="drive">Drive</button>
            <button class="option-button" type="button" data-track="dream">Dream</button>
          </div>
          <div class="option-row utility-options" aria-label="Options">
            <button id="sfx-button" class="option-button" type="button">SFX 100%</button>
            <button id="reset-best-button" class="option-button" type="button">Reset record</button>
          </div>
          <button id="start-button" type="button">Lancer la partie</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
